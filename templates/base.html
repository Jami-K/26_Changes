<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자재 변경점 관리</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  {% block head %}{% endblock %}
  <style>
    :root {
      --navy: #1A356E;
      --navy-dark: #122551;
      --navy-light: #E8ECF5;
    }
    body { background: #F4F6FB; }
    .navbar { background-color: var(--navy) !important; }
    .navbar-brand { font-size: 1.1rem; letter-spacing: .02em; }
    .nav-link { opacity: .85; }
    .nav-link:hover, .nav-link.active { opacity: 1; background: rgba(255,255,255,.12); border-radius: 6px; }

    .btn-navy { background: var(--navy); color: #fff; border: none; }
    .btn-navy:hover { background: var(--navy-dark); color: #fff; }

    .table thead th { background: var(--navy); color: #fff; white-space: nowrap; vertical-align: middle; }
    .table tbody tr:hover { background: #EEF1FA; cursor: pointer; }
    .label-cell { background: var(--navy-light); font-weight: 600; color: var(--navy); white-space: nowrap; }

    .badge-mixable-ok   { background: #198754; }
    .badge-mixable-no   { background: #dc3545; }
    .badge-mixable-etc  { background: #6c757d; }

    .card-header-navy { background: var(--navy-light); font-weight: 600; color: var(--navy); }
    .sync-status { font-size: .8rem; color: #6c757d; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark navbar-expand-lg px-3 mb-4">
    <a class="navbar-brand fw-bold" href="/"><i class="bi bi-box-seam me-2"></i>자재 변경점 관리</a>
    <div class="navbar-nav ms-auto d-flex flex-row gap-1">
      <a class="nav-link text-white px-3 py-2 {% if request.path == '/' and request.args.get('view') == 'list' %}active{% endif %}" href="/?view=list">
        <i class="bi bi-list-ul me-1"></i>변경점 목록
      </a>
      <a class="nav-link text-white px-3 py-2 {% if request.path == '/settings' %}active{% endif %}" href="/settings">
        <i class="bi bi-gear me-1"></i>설정
      </a>
    </div>
  </nav>

  <div class="container pb-5">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
